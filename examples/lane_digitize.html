<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="description" content="">
	<meta name="author" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Potree Viewer - Lane Digitize</title>

	<link rel="stylesheet" type="text/css" href="../build/potree/potree.css">
	<link rel="stylesheet" type="text/css" href="../libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" type="text/css" href="../libs/openlayers3/ol.css">
	<link rel="stylesheet" type="text/css" href="../libs/spectrum/spectrum.css">
	<link rel="stylesheet" type="text/css" href="../libs/jstree/themes/mixed/style.css">
</head>

<body>
	<script src="../libs/jquery/jquery-3.1.1.min.js"></script>
	<script src="../libs/spectrum/spectrum.js"></script>
	<script src="../libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="../libs/other/BinaryHeap.js"></script>
	<script src="../libs/tween/tween.min.js"></script>
	<script src="../libs/d3/d3.js"></script>
	<script src="../libs/proj4/proj4.js"></script>
	<script src="../libs/openlayers3/ol.js"></script>
	<script src="../libs/i18next/i18next.js"></script>
	<script src="../libs/jstree/jstree.js"></script>
	<script src="../build/potree/potree.js"></script>
	<script src="../libs/plasio/js/laslaz.js"></script>

	<div class="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; ">
		<div id="potree_render_area" style="background-image: url('../build/potree/resources/images/background.jpg');"></div>
		<div id="potree_sidebar_container"> </div>
	</div>

	<script type="module">

		import { importPredictionsAsMeasurements } from "./js/prediction-import.js";

		// dataset(s) can optionally be pre-loaded via ?dataset=id1,id2 - otherwise the
		// viewer starts empty and LAS/LAZ files are uploaded from the sidebar's Import panel.
		const datasetParam = new URLSearchParams(window.location.search).get("dataset");
		const datasets = datasetParam ? datasetParam.split(",") : [];

		const metas = await Promise.all(datasets.map(async dataset => {
			const datasetPath = `/pointclouds/${dataset}`;
			const meta = await (await fetch(`${datasetPath}/potree_meta.json`)).json();
			return {dataset, datasetPath, meta};
		}));

		if (metas.length > 0) {
			// proj4 has no built-in EPSG database - register whatever CRS the backend detected for each dataset
			for (const {meta} of metas) {
				proj4.defs(meta.epsg, meta.proj4);
			}

			// SHP export uses a single global CRS - use the first dataset's, and warn if they differ
			window.datasetMeta = metas[0].meta;
			if (metas.some(({meta}) => meta.epsg !== metas[0].meta.epsg)) {
				console.warn("Uploaded datasets have different EPSG codes; SHP export will use " + metas[0].meta.epsg);
			}
		}

		window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));

		viewer.setEDLEnabled(true);
		viewer.setFOV(60);
		viewer.setPointBudget(3_000_000);
		viewer.loadSettingsFromURL();
		viewer.setBackground("gradient");

		if (metas.length > 0) {
			viewer.setDescription(metas.map(({meta}) => `${meta.sourceFile} - ${meta.epsg}`).join(" | "));
		}

		// loadGUI() asynchronously fetches sidebar.html and replaces
		// #potree_sidebar_container's entire contents with it (jQuery .load()) -
		// wrapped in a promise and awaited so nothing below that touches that
		// container (the predict panel) runs before that swap, or it gets wiped
		// out the moment the fetch resolves.
		await new Promise(resolve => viewer.loadGUI(() => {
			viewer.setLanguage('en');
			$("#menu_tools").next().show();
			$("#menu_scene").next().show();
			$("#menu_filters").next().show();
			viewer.toggleSidebar();
			resolve();
		}));

		// class 1 = unclassified (buildings, trees, etc - from PDAL filters.smrf), class 2 = ground/road surface
		viewer.setClassifications(Potree.ClassificationScheme.DEFAULT);

		// Runs the trained U-Net (ml/infer.py + ml/vectorize_predictions.py, via
		// webapp/server.py's /api/predict) on a dataset's source LAS and imports
		// the resulting lane/crosswalk vectors as editable Measure objects. One
		// row per pointcloud in the scene, prepended above Potree's own accordion
		// menu so it's the first thing visible when the sidebar is open.
		//
		// Built reactively off scene.addEventListener('pointcloud_added', ...)
		// instead of just the initial ?dataset= list, so it also covers
		// pointclouds added later through the sidebar's own Scene > Import panel
		// (src/viewer/sidebar.js) - the normal way to open a LAS/LAZ from inside
		// an already-running viewer, without a page navigation.
		const predictPanel = document.createElement("div");
		predictPanel.style.cssText = "background: var(--bg-color); color: var(--font-color); "
			+ "padding: 10px 12px; border-bottom: 1px solid black; "
			+ "font-family: Arial, Helvetica, sans-serif; font-size: 13px;";
		const predictTitle = document.createElement("div");
		predictTitle.textContent = "차선/횡단보도 예측";
		predictTitle.style.cssText = "font-weight: bold; margin-bottom: 6px;";
		predictPanel.appendChild(predictTitle);
		document.getElementById("potree_sidebar_container").prepend(predictPanel);

		async function addPredictRow(dataset) {
			const meta = await (await fetch(`/pointclouds/${dataset}/potree_meta.json`)).json();

			const row = document.createElement("div");
			row.style.cssText = "display: flex; align-items: center; gap: 8px; margin-bottom: 4px;";

			const label = document.createElement("span");
			label.textContent = meta.sourceFile;
			label.title = meta.sourceFile;
			label.style.cssText = "flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;";

			const btn = document.createElement("button");
			btn.textContent = "예측 실행";

			const status = document.createElement("span");
			status.style.cssText = "font-size: 11px; color: #9AA1A4;";

			btn.addEventListener("click", async () => {
				btn.disabled = true;
				status.textContent = "예측 중... (씬 크기에 따라 몇 분 걸릴 수 있음)";
				try {
					const res = await fetch(`/api/predict?dataset=${encodeURIComponent(dataset)}`, {method: "POST"});
					const data = await res.json();
					if (!res.ok) throw new Error(data.detail || "예측 실패");

					const geojson = await (await fetch(data.vectors)).json();
					const counts = importPredictionsAsMeasurements(viewer, geojson);
					status.textContent = `완료 - 차선 ${counts.lane}개, 횡단보도 ${counts.crosswalk}개 (모델: ${data.model}) - `
						+ `Scene 패널에서 수정 후 SHP로 내보낼 수 있습니다.`;
				} catch (err) {
					status.textContent = "오류: " + err.message;
				} finally {
					btn.disabled = false;
				}
			});

			row.append(label, btn, status);
			predictPanel.appendChild(row);
		}

		viewer.scene.addEventListener("pointcloud_added", (e) => addPredictRow(e.pointcloud.name));

		const promises = metas.map(({dataset, datasetPath}) => Potree.loadPointCloud(`${datasetPath}/metadata.json`, dataset));

		for (const promise of promises) {
			let scene = viewer.scene;
			let pointcloud = (await promise).pointcloud;

			let material = pointcloud.material;
			material.size = 1;
			material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
			material.shape = Potree.PointShape.SQUARE;
			material.activeAttributeName = "rgba";

			scene.addPointCloud(pointcloud);
		}

		if (metas.length > 0) {
			viewer.fitToScreen();
		}

	</script>


  </body>
</html>
